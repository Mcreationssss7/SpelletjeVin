<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏎️ Lamborghini Weekkalender</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap');

  :root {
    --ma: #FF6B6B; --di: #FF9F43; --wo: #54A0FF; --do: #5F27CD;
    --vr: #00D2D3; --za: #FF6348; --zo: #FFC312;
    --bg: #1a1a2e; --card-r: 24px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Fredoka One', 'Nunito', cursive;
    background: var(--bg);
    min-height: 100vh;
    overflow-x: hidden;
    cursor: pointer;
  }

  /* Sky background */
  .sky-bg {
    position: fixed; inset: 0; z-index: 0;
    background: linear-gradient(180deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
    overflow: hidden;
  }
  .star { position: absolute; border-radius: 50%; background: white; animation: twinkle 2s infinite alternate; }
  @keyframes twinkle { from { opacity: 0.2; transform: scale(0.8); } to { opacity: 1; transform: scale(1.2); } }

  /* Web threads decoration */
  .web-corner {
    position: fixed; width: 200px; height: 200px; opacity: 0.15;
    pointer-events: none; z-index: 1;
  }
  .web-corner.tl { top: 0; left: 0; }
  .web-corner.tr { top: 0; right: 0; transform: scaleX(-1); }

  .container { position: relative; z-index: 2; padding: 16px 12px; max-width: 1200px; margin: 0 auto; }

  /* Header */
  .header { text-align: center; margin-bottom: 20px; }
  .header h1 {
    font-size: clamp(2rem, 5vw, 3.5rem);
    color: #FFE66D;
    text-shadow: 0 0 30px rgba(255,230,109,0.5), 3px 3px 0 #e63946;
    letter-spacing: 2px;
    animation: titlePulse 3s ease-in-out infinite;
  }
  @keyframes titlePulse {
    0%,100% { transform: scale(1); } 50% { transform: scale(1.02); }
  }

  /* Week row */
  .week-container { position: relative; margin-bottom: 24px; }

  .week-row {
    display: flex; gap: 10px; justify-content: center;
    flex-wrap: nowrap; overflow-x: auto; padding: 10px 4px;
    scrollbar-width: thin; scrollbar-color: #e63946 #302b63;
  }

  .day-card {
    flex: 1; min-width: 100px; max-width: 150px;
    border-radius: var(--card-r);
    padding: 14px 10px 16px;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    cursor: pointer;
    border: 4px solid transparent;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    position: relative; overflow: visible;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .day-card:hover { transform: translateY(-6px) scale(1.04); }
  .day-card:active { transform: scale(0.95); }

  .day-card.ma { background: linear-gradient(145deg, #FF6B6B, #c0392b); }
  .day-card.di { background: linear-gradient(145deg, #FF9F43, #e67e22); }
  .day-card.wo { background: linear-gradient(145deg, #54A0FF, #2980b9); }
  .day-card.do { background: linear-gradient(145deg, #a29bfe, #5F27CD); }
  .day-card.vr { background: linear-gradient(145deg, #00D2D3, #0984e3); }
  .day-card.za { background: linear-gradient(145deg, #fd79a8, #e84393); }
  .day-card.zo { background: linear-gradient(145deg, #FFC312, #f39c12); }

  /* Day states */
  .day-card.is-gisteren { filter: brightness(0.65) saturate(0.7); }
  .day-card.is-vandaag {
    border-color: #FFE66D;
    box-shadow: 0 0 30px rgba(255,230,109,0.7), 0 0 60px rgba(255,230,109,0.3);
    animation: vandaagPulse 2s ease-in-out infinite;
    transform: scale(1.08);
    z-index: 10;
  }
  .day-card.is-vandaag:hover { transform: scale(1.12) translateY(-4px); }
  @keyframes vandaagPulse {
    0%,100% { box-shadow: 0 0 30px rgba(255,230,109,0.7), 0 0 60px rgba(255,230,109,0.3); }
    50% { box-shadow: 0 0 50px rgba(255,230,109,1), 0 0 100px rgba(255,230,109,0.5); }
  }
  .day-card.is-morgen { filter: brightness(1.15) saturate(1.2); }
  .day-card.is-morgen::after {
    content: '🌅'; position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
    font-size: 22px; animation: floatSun 2s ease-in-out infinite;
  }
  @keyframes floatSun { 0%,100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(-5px); } }

  .day-icon { font-size: 2.8rem; line-height: 1; }
  .day-name {
    font-size: 1.05rem; color: white;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
    text-align: center; font-weight: 900; letter-spacing: 0.5px;
  }
  .day-time-icon { font-size: 1.4rem; }
  .day-sound-btn {
    background: rgba(255,255,255,0.25); border: none; border-radius: 50%;
    width: 36px; height: 36px; font-size: 1rem; cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    display: flex; align-items: center; justify-content: center;
  }
  .day-sound-btn:hover { background: rgba(255,255,255,0.45); transform: scale(1.15); }

  /* Lambo on today */
  .lambo-badge {
    position: absolute; top: -44px; left: 50%; transform: translateX(-50%);
    font-size: 2.6rem; animation: lamboBounce 1s ease-in-out infinite;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
    pointer-events: none;
  }
  @keyframes lamboBounce {
    0%,100% { transform: translateX(-50%) translateY(0) rotate(-5deg); }
    50% { transform: translateX(-50%) translateY(-10px) rotate(5deg); }
  }

  /* Context bar */
  .context-bar {
    display: flex; justify-content: center; gap: 20px;
    margin-bottom: 20px; flex-wrap: wrap;
  }
  .context-chip {
    background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2);
    border-radius: 100px; padding: 10px 20px;
    color: white; font-size: 1.1rem; display: flex; align-items: center; gap: 10px;
    backdrop-filter: blur(10px);
  }
  .context-chip .label { font-size: 0.85rem; opacity: 0.7; display: block; }
  .context-chip .value { font-size: 1.2rem; font-weight: 900; }
  .chip-gisteren { border-color: rgba(255,107,107,0.5); }
  .chip-vandaag { border-color: rgba(255,230,109,0.8); background: rgba(255,230,109,0.15); }
  .chip-morgen { border-color: rgba(84,160,255,0.5); }

  /* Main action buttons */
  .action-row {
    display: flex; justify-content: center; gap: 16px;
    margin-bottom: 24px; flex-wrap: wrap;
  }
  .action-btn {
    min-width: 140px; padding: 18px 24px;
    border: none; border-radius: 20px; cursor: pointer;
    font-family: 'Fredoka One', cursive; font-size: 1.3rem;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative; overflow: hidden;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .action-btn::before {
    content: ''; position: absolute; inset: 0;
    background: rgba(255,255,255,0.2); opacity: 0;
    transition: opacity 0.2s;
  }
  .action-btn:hover::before { opacity: 1; }
  .action-btn:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.4); }
  .action-btn:active { transform: scale(0.95); }
  .action-btn .btn-icon { font-size: 2.2rem; }
  .action-btn .btn-label { color: white; text-shadow: 1px 1px 3px rgba(0,0,0,0.4); font-size: 1rem; }

  .btn-gisteren { background: linear-gradient(135deg, #636e72, #2d3436); }
  .btn-vandaag { background: linear-gradient(135deg, #e63946, #c0392b); }
  .btn-morgen { background: linear-gradient(135deg, #0984e3, #74b9ff); }
  .btn-verhaal { background: linear-gradient(135deg, #6c5ce7, #a29bfe); }
  .btn-repeat { background: linear-gradient(135deg, #00b894, #55efc4); }
  @keyframes zoomRight {
    0% { transform: translateY(-50%) scaleX(1); }
    30% { transform: translateY(-50%) scaleX(1.3) scaleY(0.85); }
    100% { transform: translateY(-50%) scaleX(1); }
  }
  @keyframes zoomLeft {
    0% { transform: translateY(-50%) scaleX(-1); }
    30% { transform: translateY(-50%) scaleX(-1.3) scaleY(0.85); }
    100% { transform: translateY(-50%) scaleX(-1); }
  }

  /* Mini game */
  .game-section {
    background: rgba(255,255,255,0.06); border-radius: 24px;
    padding: 20px; margin-bottom: 20px;
    border: 2px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
  }
  .game-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
  }
  .game-title { color: #FFE66D; font-size: 1.5rem; }
  .game-score { display: flex; gap: 4px; }
  .star { font-size: 1.5rem; transition: transform 0.3s; }
  .star.earned { animation: starPop 0.4s ease-out; }
  @keyframes starPop { 0% { transform: scale(0); } 70% { transform: scale(1.4); } 100% { transform: scale(1); } }

  .game-question-area {
    text-align: center; padding: 16px;
    background: rgba(0,0,0,0.2); border-radius: 16px;
    margin-bottom: 16px;
  }
  .game-question { font-size: 1.8rem; color: white; margin-bottom: 8px; }
  .game-question-icon { font-size: 3rem; animation: questionBounce 1s ease-in-out infinite; }
  @keyframes questionBounce { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }

  .game-start-btn {
    background: linear-gradient(135deg, #FFE66D, #f39c12);
    border: none; border-radius: 16px; padding: 16px 32px;
    font-family: 'Fredoka One', cursive; font-size: 1.4rem;
    cursor: pointer; color: #2d3436;
    box-shadow: 0 8px 20px rgba(255,230,109,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
    display: block; margin: 0 auto;
  }
  .game-start-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(255,230,109,0.6); }

  .game-feedback {
    text-align: center; font-size: 2rem; padding: 16px;
    border-radius: 16px; display: none;
    animation: feedbackPop 0.4s ease-out;
  }
  @keyframes feedbackPop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  .game-feedback.correct { background: rgba(0,184,148,0.3); color: #55efc4; display: block; }
  .game-feedback.wrong { background: rgba(255,107,107,0.3); color: #FF6B6B; display: block; }

  /* Confetti */
  .confetti-piece {
    position: fixed; width: 12px; height: 12px; border-radius: 2px;
    pointer-events: none; z-index: 9999;
    animation: confettiFall 2s ease-in forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* Lambo jump animation */
  .lambo-jump {
    position: fixed; font-size: 5rem; pointer-events: none; z-index: 9998;
    animation: lamboJump 1.5s ease-out forwards;
  }
  @keyframes lamboJump {
    0% { transform: translateY(100vh) rotate(-20deg); opacity: 0; }
    30% { opacity: 1; }
    60% { transform: translateY(-20px) rotate(10deg); }
    80% { transform: translateY(20px) rotate(-5deg); }
    100% { transform: translateY(0) rotate(0deg); opacity: 0; }
  }

  /* Week groups */
  .week-groups {
    display: flex; gap: 14px; align-items: flex-start;
    justify-content: center; flex-wrap: wrap;
  }
  .week-group {
    border-radius: 20px; padding: 10px 10px 12px;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    flex: 0 0 auto;
  }
  .group-school {
    background: rgba(84,160,255,0.12);
    border: 2px solid rgba(84,160,255,0.3);
  }
  .group-weekend {
    background: rgba(255,195,18,0.12);
    border: 2px solid rgba(255,195,18,0.35);
  }
  .group-label {
    color: white; font-size: 1rem; opacity: 0.85;
    letter-spacing: 1px; text-transform: uppercase;
    text-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }
  .group-school .group-label { color: #74b9ff; }
  .group-weekend .group-label { color: #FFC312; }
  .week-group .week-row {
    justify-content: center; padding: 2px; overflow-x: visible;
  }

  /* Nav arrows */
  .nav-arrow {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3);
    border-radius: 50%; width: 48px; height: 48px;
    font-size: 1.4rem; cursor: pointer; color: white;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, transform 0.15s;
    z-index: 5; backdrop-filter: blur(8px);
  }
  .nav-arrow:hover { background: rgba(255,255,255,0.3); transform: translateY(-50%) scale(1.1); }
  .nav-arrow.left { left: -10px; }
  .nav-arrow.right { right: -10px; }

  /* Responsive */
  @media (max-width: 700px) {
    .day-card { min-width: 80px; padding: 10px 6px; }
    .day-icon { font-size: 2rem; }
    .day-name { font-size: 0.85rem; }
    .action-btn { min-width: 110px; padding: 14px 16px; font-size: 1.1rem; }
    .week-row { gap: 6px; }
  }

  /* Draggable Spiderman */
  .drag-lambo {
    position: fixed; font-size: 3.5rem; cursor: grab; z-index: 1000;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
    transition: transform 0.1s;
    user-select: none;
    bottom: 20px; right: 20px;
  }
  .drag-lambo:active { cursor: grabbing; transform: scale(1.2); }
  .drag-lambo.dragging { transition: none; }

  .drag-hint { position: fixed; bottom: 24px; right: 80px; color: rgba(255,255,255,0.5); font-size: 0.85rem; pointer-events: none; }

  /* Toast message */
  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: rgba(30,30,60,0.95); color: white; border-radius: 16px;
    padding: 12px 24px; font-size: 1.1rem; opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    z-index: 9997; border: 2px solid rgba(255,230,109,0.4);
    backdrop-filter: blur(10px); pointer-events: none;
    max-width: 80vw; text-align: center;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Feestbus */
  .feestbus-container {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    pointer-events: none; z-index: 9999; overflow: hidden;
  }
  .feestbus {
    position: absolute; white-space: nowrap;
    animation: busRijdt 6s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
  }
  .feestbus-svg {
    filter: drop-shadow(0 6px 16px rgba(0,0,0,0.5));
  }
  .disco-light {
    animation: discoFlash 0.18s infinite alternate;
  }
  .disco-light-1 { animation-delay: 0s; }
  .disco-light-2 { animation-delay: 0.06s; }
  .disco-light-3 { animation-delay: 0.12s; }
  .disco-light-4 { animation-delay: 0.04s; }
  .disco-light-5 { animation-delay: 0.09s; }
  @keyframes discoFlash {
    0%   { opacity: 1; }
    100% { opacity: 0.2; }
  }
  .bus-wheel {
    animation: wielDraaien 0.3s linear infinite;
    transform-origin: center;
  }
  @keyframes wielDraaien {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  @keyframes busRijdt {
    0%   { left: -520px; top: 38vh; }
    100% { left: 110vw;  top: 38vh; }
  }
  .bus-muziek {
    position: absolute; font-size: 1.6rem;
    animation: muziekFloat 0.5s ease-in-out infinite alternate;
  }
  .bus-muziek-1 { top: -30px; left: 60px;  animation-delay: 0s; }
  .bus-muziek-2 { top: -45px; left: 160px; animation-delay: 0.15s; }
  .bus-muziek-3 { top: -30px; left: 260px; animation-delay: 0.3s; }
  @keyframes muziekFloat {
    from { transform: translateY(0) rotate(-10deg); opacity: 1; }
    to   { transform: translateY(-18px) rotate(10deg); opacity: 0.4; }
  }
</style>
</head>
<body>

<!-- Sky background with stars -->
<div class="sky-bg" id="skyBg"></div>

<!-- Spider web corners -->
<svg class="web-corner tl" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M0,0 L200,0 L0,200 Z" fill="rgba(255,255,255,0.05)"/>
  <line x1="0" y1="0" x2="200" y2="200" stroke="white" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="0" x2="100" y2="200" stroke="white" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="0" x2="200" y2="100" stroke="white" stroke-width="0.5" opacity="0.3"/>
  <ellipse cx="0" cy="0" rx="80" ry="80" fill="none" stroke="white" stroke-width="0.5" opacity="0.3"/>
  <ellipse cx="0" cy="0" rx="140" ry="140" fill="none" stroke="white" stroke-width="0.5" opacity="0.2"/>
  <ellipse cx="0" cy="0" rx="200" ry="200" fill="none" stroke="white" stroke-width="0.5" opacity="0.15"/>
</svg>
<svg class="web-corner tr" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <line x1="0" y1="0" x2="200" y2="200" stroke="white" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="0" x2="100" y2="200" stroke="white" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="0" x2="200" y2="100" stroke="white" stroke-width="0.5" opacity="0.3"/>
  <ellipse cx="0" cy="0" rx="80" ry="80" fill="none" stroke="white" stroke-width="0.5" opacity="0.3"/>
  <ellipse cx="0" cy="0" rx="140" ry="140" fill="none" stroke="white" stroke-width="0.5" opacity="0.2"/>
</svg>

<div class="container">
  <!-- Header -->
  <div class="header">
    <h1>🏎️ Lamborghini Weekkalender 🏎️</h1>
  </div>

  <!-- Context chips -->
  <div class="context-bar" id="contextBar">
    <div class="context-chip chip-gisteren">
      <span>🌇</span>
      <div><span class="label">Gisteren</span><span class="value" id="gisterenChip">—</span></div>
    </div>
    <div class="context-chip chip-vandaag">
      <span>☀️</span>
      <div><span class="label">Vandaag</span><span class="value" id="vandaagChip">—</span></div>
    </div>
    <div class="context-chip chip-morgen">
      <span>🌅</span>
      <div><span class="label">Morgen</span><span class="value" id="morgenChip">—</span></div>
    </div>
  </div>

  <!-- Week row with nav arrows -->
  <div class="week-container">
    <button class="nav-arrow left" id="navLeft" onclick="navigate(-1)">◀</button>
    <div class="week-groups">
      <div class="week-group group-school">
        <div class="group-label">🏫 School</div>
        <div class="week-row" id="weekRowSchool"></div>
      </div>
      <div class="week-group group-weekend">
        <div class="group-label">🎉 Weekend</div>
        <div class="week-row" id="weekRowWeekend"></div>
      </div>
    </div>
    <button class="nav-arrow right" id="navRight" onclick="navigate(1)">▶</button>
  </div>

  <!-- Action buttons -->
  <div class="action-row">
    <button class="action-btn btn-gisteren" onclick="goGisteren()">
      <span class="btn-icon">⬅️</span>
      <span class="btn-label">Gisteren</span>
    </button>
    <button class="action-btn btn-vandaag" onclick="goVandaag()">
      <span class="btn-icon">🏎️</span>
      <span class="btn-label">Vandaag!</span>
    </button>
    <button class="action-btn btn-morgen" onclick="goMorgen()">
      <span class="btn-icon">➡️</span>
      <span class="btn-label">Morgen</span>
    </button>
    <button class="action-btn btn-verhaal" onclick="vertelVerhaal()">
      <span class="btn-icon">📖</span>
      <span class="btn-label">Vertel!</span>
    </button>
    <button class="action-btn btn-repeat" onclick="zingWeek()">
      <span class="btn-icon">🎵</span>
      <span class="btn-label">De Week</span>
    </button>
  </div>

  <!-- Mini game -->
  <div class="game-section">
    <div class="game-header">
      <span class="game-title">🎮 Spel: Waar is morgen?</span>
      <div class="game-score" id="gameScore">
        <span class="star" id="star1">⭐</span>
        <span class="star" id="star2">⭐</span>
        <span class="star" id="star3">⭐</span>
        <span class="star" id="star4">⭐</span>
        <span class="star" id="star5">⭐</span>
      </div>
    </div>
    <div class="game-question-area" id="gameQuestionArea">
      <div class="game-question-icon" id="gameIcon">🏎️</div>
      <div class="game-question" id="gameQuestion">Klik hieronder om te spelen!</div>
      <button class="game-start-btn" id="gameStartBtn" onclick="startGame()">🎮 Speel!</button>
    </div>
    <div class="game-feedback" id="gameFeedback"></div>
  </div>
</div>

<!-- Draggable Spiderman -->
<div class="drag-lambo" id="dragSpider" title="Sleep mij naar een dag!">🏎️</div>
<div class="drag-hint">↑ Sleep mij!</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ─── Data ───────────────────────────────────────────────────────────────────
const DAYS = [
  { key: 'ma', name: 'Maandag',   short: 'Ma', icon: '🚗', cls: 'ma', extra: 'De eerste dag van de week!' },

let vandaagIdx = realTodayIdx;                    // volgt klikken in de app

let gameActive = false;
let gameTarget = null;
let score = 0;
let singing = false;

// ─── Render week ─────────────────────────────────────────────────────────────
function render() {
  const schoolRow = document.getElementById('weekRowSchool');
  const weekendRow = document.getElementById('weekRowWeekend');
  schoolRow.innerHTML = '';
  weekendRow.innerHTML = '';

  DAYS.forEach((d, i) => {
    const row = i < 5 ? schoolRow : weekendRow;
    const card = document.createElement('div');
    card.className = `day-card ${d.cls}`;
    card.dataset.idx = i;

    const isVandaag = i === vandaagIdx;
    const isGisteren = i === (vandaagIdx + 6) % 7;
    const isMorgen = i === (vandaagIdx + 1) % 7;

    if (isVandaag) card.classList.add('is-vandaag');
    else if (isGisteren) card.classList.add('is-gisteren');
    else if (isMorgen) card.classList.add('is-morgen');

    const timeIcon = isGisteren ? '🌇' : isMorgen ? '🌅' : isVandaag ? '☀️' : '🌙';

    card.innerHTML = `
      ${isVandaag ? '<div class="lambo-badge">🏎️</div>' : ''}
      <div class="day-icon">${d.icon}</div>
      <div class="day-name">${d.short}</div>
      <div class="day-time-icon">${timeIcon}</div>
      <button class="day-sound-btn" onclick="event.stopPropagation();speakDay(${i})">🔊</button>
    `;

    card.addEventListener('click', () => selectDay(i));

    // Drag-over for draggable spiderman
    card.addEventListener('dragover', e => { e.preventDefault(); card.style.outline = '4px dashed #FFE66D'; });
    card.addEventListener('dragleave', () => { card.style.outline = ''; });
    card.addEventListener('drop', e => {
      e.preventDefault(); card.style.outline = '';
      selectDay(i);
      showToast(`🏎️ Lamborghini is nu op ${DAYS[i].name}!`);
    });

    row.appendChild(card);
  });

  updateChips();

  // Game: highlight target if active
  if (gameActive && gameTarget !== null) {
    setTimeout(() => {
      const cards = document.querySelectorAll('.day-card');
      cards.forEach((c, i) => {
        if (i === gameTarget) c.style.outline = 'none';
      });
    }, 0);
  }
}

function updateChips() {
  const gIdx = (vandaagIdx + 6) % 7;
  const mIdx = (vandaagIdx + 1) % 7;
  document.getElementById('gisterenChip').textContent = DAYS[gIdx].name;
  document.getElementById('vandaagChip').textContent = DAYS[vandaagIdx].name;
  document.getElementById('morgenChip').textContent = DAYS[mIdx].name;
}


// ─── Day selection ───────────────────────────────────────────────────────────
function selectDay(idx) {
  if (gameActive) {
    // During a game: only check the answer, don't move vandaag
    checkGameAnswer(idx);
    render(); // redraw to clear any hover/active visual states
    return;
  }
  vandaagIdx = idx;
  render();
  speakDay(idx);
}

function navigate(dir) {
  vandaagIdx = (vandaagIdx + dir + 7) % 7;
  render();
  speakDay(vandaagIdx);
}

// ─── Action buttons ──────────────────────────────────────────────────────────
function goGisteren() {
  const gIdx = (vandaagIdx + 6) % 7;
  speak(`Gisteren was het ${DAYS[gIdx].name}`);
  showToast(`🌇 Gisteren was het ${DAYS[gIdx].name}`);
  highlightCard(gIdx, 800);
}

function goMorgen() {
  const mIdx = (vandaagIdx + 1) % 7;
  speak(`Morgen is het ${DAYS[mIdx].name}`);
  showToast(`🌅 Morgen is het ${DAYS[mIdx].name}`);
  highlightCard(mIdx, 800);
}

function goVandaag() {
  vandaagIdx = realTodayIdx;
  render();
  speak(`Vandaag is het ${DAYS[vandaagIdx].name}! De Lamborghini is hier!`);
  lamboJump();
  showToast(`🏎️ Vandaag is het ${DAYS[vandaagIdx].name}!`);
  const cards = document.querySelectorAll('.day-card');
  cards.forEach((c,i) => { if(i===vandaagIdx) { c.style.transform='scale(1.2)'; setTimeout(()=>c.style.transform='',300); } });
}

function highlightCard(idx, dur) {
  const cards = document.querySelectorAll('.day-card');
  if (!cards[idx]) return;
  cards[idx].style.outline = '5px solid #FFE66D';
  setTimeout(() => { if(cards[idx]) cards[idx].style.outline = ''; }, dur);
}


// ─── Speech ──────────────────────────────────────────────────────────────────
let speechQueue = [];
let isSpeaking = false;

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'nl-NL';
  utt.rate = 0.85;
  utt.pitch = 1.2;

  // Try to use a Dutch voice
  const voices = window.speechSynthesis.getVoices();
  const nlVoice = voices.find(v => v.lang.startsWith('nl'));
  if (nlVoice) utt.voice = nlVoice;

  window.speechSynthesis.speak(utt);
}

function speakDay(idx) {
  const d = DAYS[idx];
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();

  const voices = window.speechSynthesis.getVoices();
  const nlVoice = voices.find(v => v.lang.startsWith('nl'));

  function makeUtt(text) {
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'nl-NL';
    utt.rate = 0.85;
    utt.pitch = 1.2;
    if (nlVoice) utt.voice = nlVoice;
    return utt;
  }

  const parts = d.extra ? d.extra.split('! ').reduce((acc, p, i, arr) => {
    acc.push(i < arr.length - 1 ? p + '!' : p);
    return acc;
  }, [d.name]) : [d.name];

  let i = 0;
  function sayNext() {
    if (i >= parts.length) return;
    const utt = makeUtt(parts[i]);
    const capturedI = i;
    utt.onend = () => { setTimeout(sayNext, 150); };
    window.speechSynthesis.speak(utt);
    i++;
  }
  sayNext();
}

  ];

function zingWeek() {
  if (singing) return;
  singing = true;
  let i = 0;
  const names = DAYS.map(d => d.name);
  const intro = new SpeechSynthesisUtterance('De dagen van de week zijn:');
  intro.lang = 'nl-NL'; intro.rate = 0.9;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(intro);
  showToast('🎵 Luister naar de week!');

  function sayNext() {
    if (i >= names.length) { singing = false; return; }
    const currentI = i;
    const utt = new SpeechSynthesisUtterance(names[currentI]);
    utt.lang = 'nl-NL'; utt.rate = 0.8; utt.pitch = 1.0 + (currentI * 0.05);
    utt.onend = () => { setTimeout(sayNext, 300); };
    window.speechSynthesis.speak(utt);
    highlightCard(currentI, 900);
    i++;
  }

  intro.onend = () => { i = 0; sayNext(); };
}

// ─── Mini game ───────────────────────────────────────────────────────────────
const GAME_QUESTIONS = [
  {
    question: 'Waar is morgen? 🌅',
    speech: 'Welke dag is morgen?',
    getTarget: () => (realTodayIdx + 1) % 7,
  },
  {
    question: 'Waar is gisteren? 🌇',
    speech: 'Welke dag was gisteren?',
    getTarget: () => (realTodayIdx + 6) % 7,
  },
  {
    question: 'Waar is vandaag? ☀️',
    speech: 'Welke dag is vandaag?',
    getTarget: () => realTodayIdx,
  },
  {
    question: 'Wat is de eerste dag van de week? 📅',
    speech: 'Wat is de eerste dag van de week?',
    getTarget: () => 0, // maandag
  },
  {
    question: 'Wat is de laatste dag van school? 🏫',
    speech: 'Wat is de laatste dag van school?',
    getTarget: () => 4, // vrijdag
  },
  {
    question: 'Wat is de eerste dag van het weekend? 🎉',
    speech: 'Wat is de eerste dag van het weekend?',
    getTarget: () => 5, // zaterdag
  },
  {
    question: 'Wat is de laatste dag van het weekend? 😴',
    speech: 'Wat is de laatste dag van het weekend?',
    getTarget: () => 6, // zondag
  },
  {
    question: 'Op welke dag moet jij zwemmen? 🏊',
    speech: 'Op welke dag moet jij zwemmen?',
    getTarget: () => 5, // zaterdag
  },
];

let questionPool = [];

function pickNextQuestion() {
  // Refill pool when empty (shuffle all indices)
  if (questionPool.length === 0) {
    questionPool = GAME_QUESTIONS.map((_, i) => i);
    // Fisher-Yates shuffle
    for (let i = questionPool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [questionPool[i], questionPool[j]] = [questionPool[j], questionPool[i]];
    }
  }
  return questionPool.pop();
}

function startGame() {
  gameActive = true;
  vandaagIdx = realTodayIdx;
  render();

  const qIdx = pickNextQuestion();
  const q = GAME_QUESTIONS[qIdx];

  gameTarget = q.getTarget();
  document.getElementById('gameQuestion').textContent = q.question;
  document.getElementById('gameIcon').textContent = '🤔';
  document.getElementById('gameStartBtn').style.display = 'none';
  document.getElementById('gameFeedback').className = 'game-feedback';
  document.getElementById('gameFeedback').textContent = '';

  speak(q.speech);
  showToast('👆 Klik op de juiste dag!');
}

function checkGameAnswer(idx) {
  if (!gameActive || gameTarget === null) return;

  const feedback = document.getElementById('gameFeedback');
  if (idx === gameTarget) {
    // Correct!
    gameActive = false;
    feedback.textContent = '🎉 Super goed! 🏎️ De Lamborghini toetert!';
    feedback.className = 'game-feedback correct';
    speak('Super goed! Dat klopt!');
    lamboJump();
    launchConfetti();
    launchFeestbus();
    addStar();
    document.getElementById('gameIcon').textContent = '🎉';
    setTimeout(resetGame, 3000);
  } else {
    // Wrong
    feedback.textContent = '❌ Probeer opnieuw! 🚗 Toet toet!';
    feedback.className = 'game-feedback wrong';
    speak('Hmm, probeer nog eens!');
    document.getElementById('gameIcon').textContent = '😅';
    const cards = document.querySelectorAll('.day-card');
    if (cards[idx]) {
      cards[idx].style.animation = 'shake 0.4s ease';
      cards[idx].style.outline = '4px solid #FF6B6B';
      setTimeout(() => {
        if (cards[idx]) {
          cards[idx].style.animation = '';
          cards[idx].style.outline = '';
        }
      }, 600);
    }
    setTimeout(() => { feedback.className = 'game-feedback'; }, 2000);
  }
}

function resetGame() {
  gameActive = false;
  gameTarget = null;
  document.getElementById('gameQuestion').textContent = 'Klik hieronder om te spelen!';
  document.getElementById('gameIcon').textContent = '🏎️';
  document.getElementById('gameStartBtn').style.display = 'block';
  document.getElementById('gameFeedback').className = 'game-feedback';
}

function addStar() {
  if (score < 5) {
    score++;
    const star = document.getElementById('star' + score);
    if (star) { star.textContent = '🌟'; star.classList.add('earned'); }
  } else {
    // Reset after 5
    score = 0;
    for (let i=1;i<=5;i++) { const s=document.getElementById('star'+i); if(s){s.textContent='⭐';s.classList.remove('earned');} }
    score = 1;
    const star = document.getElementById('star1');
    if (star) { star.textContent = '🌟'; star.classList.add('earned'); }
  }
}

}

// ─── Draggable Spiderman ─────────────────────────────────────────────────────
(function setupDrag() {
  const sp = document.getElementById('dragSpider');
  sp.draggable = true;

  let ox=0, oy=0, dragging=false;

  sp.addEventListener('mousedown', e => {
    dragging = true;
    sp.classList.add('dragging');
    ox = e.clientX - sp.getBoundingClientRect().left;
    oy = e.clientY - sp.getBoundingClientRect().top;
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    sp.style.left = (e.clientX - ox) + 'px';
    sp.style.top = (e.clientY - oy) + 'px';
    sp.style.right = 'auto'; sp.style.bottom = 'auto';
  });

  document.addEventListener('mouseup', e => {
    if (!dragging) return;
    dragging = false;
    sp.classList.remove('dragging');

    // Check if dropped on a day card
    const cards = document.querySelectorAll('.day-card');
    cards.forEach((card, i) => {
      const r = card.getBoundingClientRect();
      if (e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom) {
        selectDay(i);
        showToast(`🏎️ Lamborghini kiest ${DAYS[i].name}!`);
      }
    });
  });

  // Touch support
  sp.addEventListener('touchstart', e => {
    dragging = true; sp.classList.add('dragging');
    const t = e.touches[0];
    ox = t.clientX - sp.getBoundingClientRect().left;
    oy = t.clientY - sp.getBoundingClientRect().top;
  }, {passive:true});

  document.addEventListener('touchmove', e => {
    if (!dragging) return;
    const t = e.touches[0];
    sp.style.left = (t.clientX - ox) + 'px';
    sp.style.top = (t.clientY - oy) + 'px';
    sp.style.right = 'auto'; sp.style.bottom = 'auto';
  }, {passive:true});

  document.addEventListener('touchend', e => {
    if (!dragging) return; dragging = false; sp.classList.remove('dragging');
    const t = e.changedTouches[0];
    const cards = document.querySelectorAll('.day-card');
    cards.forEach((card, i) => {
      const r = card.getBoundingClientRect();
      if (t.clientX >= r.left && t.clientX <= r.right && t.clientY >= r.top && t.clientY <= r.bottom) {
        selectDay(i); showToast(`🏎️ Lamborghini kiest ${DAYS[i].name}!`);
      }
    });
  }, {passive:true});
})();
